<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - Admin Only</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 60px 40px;
        }

        h1 {
            font-size: 2rem;
            color: #1a202c;
            margin-bottom: 30px;
            font-weight: 700;
            text-align: center;
        }

        /* Login Form */
        #login-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.95rem;
            color: #4a5568;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="password"] {
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }

        .error-msg {
            background: #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            text-align: center;
        }

        /* Analytics Section */
        #analytics-section {
            display: none;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logout-btn {
            background: #f7fafc;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #667eea;
            color: white;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            text-align: center;
        }

        .stat-card.conversion {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }

        .stat-card.conversion.medium {
            background: linear-gradient(135deg, #ecc94b 0%, #d69e2e 100%);
        }

        .stat-card.conversion.low {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
        }

        .conversion-card {
            background: #f7fafc;
            padding: 30px;
            border-radius: 12px;
            border-left: 6px solid #667eea;
            margin-bottom: 30px;
        }

        .conversion-title {
            font-size: 1.1rem;
            color: #1a202c;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .bar-container {
            width: 100%;
            height: 40px;
            background: #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .conversion-text {
            color: #4a5568;
            font-size: 0.95rem;
        }

        .info-section {
            background: #edf2f7;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info-label {
            font-size: 0.85rem;
            color: #4a5568;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .info-value {
            font-size: 1.1rem;
            color: #1a202c;
            font-weight: 500;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #764ba2;
        }

        .auto-refresh-note {
            color: #718096;
            font-size: 0.85rem;
            margin-top: 15px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .stat-value {
                font-size: 2rem;
            }

            .analytics-grid {
                grid-template-columns: 1fr;
            }

            .header-row {
                flex-direction: column;
                gap: 15px;
            }

            .logout-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="login-section">
            <h1>🔐 Admin Analytics</h1>
            <div class="login-form">
                <p style="text-align: center; color: #4a5568; margin-bottom: 20px;">
                    Enter your admin password to view analytics
                </p>
                <div class="form-group">
                    <label for="password">Admin Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter password"
                        onkeypress="if(event.key === 'Enter') login()"
                    >
                </div>
                <button class="login-btn" onclick="login()">Login</button>
                <div id="error-msg" class="error-msg" style="display: none;"></div>
            </div>
        </div>

        <!-- Analytics Section -->
        <div id="analytics-section">
            <div class="header-row">
                <h1>📊 Analytics Dashboard</h1>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="analytics-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Visits</div>
                    <div class="stat-value" id="stat-visits">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Clicks</div>
                    <div class="stat-value" id="stat-clicks">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Conversion Rate</div>
                    <div class="stat-value" id="stat-conversion">0%</div>
                </div>
            </div>

            <div class="conversion-card">
                <div class="conversion-title">Conversion Rate Progress</div>
                <div class="bar-container">
                    <div class="bar-fill" id="conversion-bar" style="width: 0%">
                        <span id="bar-text">0%</span>
                    </div>
                </div>
                <p class="conversion-text">
                    <strong id="clicks-text">0</strong> clicks recorded
                </p>
            </div>

            <div class="info-section">
                <div class="info-label">Last Updated</div>
                <div class="info-value" id="last-updated">Just now</div>
            </div>

            <button class="refresh-btn" onclick="refreshAnalytics()" style="width: 100%;">
                🔄 Refresh Now
            </button>
            <p class="auto-refresh-note">Auto-refreshes every 5 seconds</p>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "sandsad22"; // Change this to your desired password
        const BACKEND_URL = "http://localhost:5000"; // Change this when deploying

        // Check if logged in
        function checkAuth() {
            const isLoggedIn = localStorage.getItem("analyticsLoggedIn");
            if (isLoggedIn === "true") {
                showAnalytics();
            }
        }

        // Login handler
        function login() {
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("error-msg");

            if (password === ADMIN_PASSWORD) {
                localStorage.setItem("analyticsLoggedIn", "true");
                showAnalytics();
                refreshAnalytics();
            } else {
                errorMsg.innerText = "❌ Incorrect password. Try again.";
                errorMsg.style.display = "block";
                document.getElementById("password").value = "";
            }
        }

        // Show analytics section
        function showAnalytics() {
            document.getElementById("login-section").style.display = "none";
            document.getElementById("analytics-section").style.display = "block";
        }

        // Logout handler
        function logout() {
            localStorage.removeItem("analyticsLoggedIn");
            document.getElementById("login-section").style.display = "flex";
            document.getElementById("analytics-section").style.display = "none";
            document.getElementById("password").value = "";
            document.getElementById("error-msg").style.display = "none";
        }

        // Refresh analytics data
        function refreshAnalytics() {
            fetch(BACKEND_URL + "/analytics", {
                method: "GET",
                mode: "cors"
            })
                .then(response => response.json())
                .then(data => {
                    console.log("✅ Analytics fetched:", data);
                    document.getElementById("stat-visits").innerText = data.visits;
                    document.getElementById("stat-clicks").innerText = data.clicks;
                    document.getElementById("stat-conversion").innerText = data.conversion.toFixed(1) + "%";
                    
                    // Update conversion card color based on conversion rate
                    const conversionCard = document.querySelectorAll(".stat-card")[2];
                    conversionCard.classList.remove("medium", "low");
                    if (data.conversion >= 20) {
                        conversionCard.classList.add("conversion");
                    } else if (data.conversion >= 10) {
                        conversionCard.classList.add("conversion", "medium");
                    } else if (data.conversion > 0) {
                        conversionCard.classList.add("conversion", "low");
                    }
                    
                    const barFill = document.getElementById("conversion-bar");
                    const percentage = Math.min(data.conversion, 100);
                    barFill.style.width = percentage + "%";
                    document.getElementById("bar-text").innerText = data.conversion.toFixed(1) + "%";
                    
                    document.getElementById("clicks-text").innerText = data.clicks;
                    
                    // Update last updated time
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString();
                    document.getElementById("last-updated").innerText = "Updated at " + timeStr;
                })
                .catch(error => {
                    console.log("❌ Analytics fetch error:", error);
                    console.log("Make sure backend is running at " + BACKEND_URL);
                });
        }

        // Auto-refresh every 5 seconds
        setInterval(() => {
            if (localStorage.getItem("analyticsLoggedIn") === "true") {
                refreshAnalytics();
            }
        }, 5000);

        // Check auth on page load
        window.addEventListener("load", checkAuth);
    </script>
</body>
</html>
